<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Navbar in HTML</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        ul{
            background-color: aqua;
            list-style: none;
            display: flex;
            gap: 50px;
            line-height: 60px;
            padding-left: 40px;
            font-size: large;
            color: red;
        }
        ul, li, a{
            text-decoration: none;
        }
        ul, li, a:hover{
            color: red;
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Service</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</body>
</html>
