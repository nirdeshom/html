<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordered List & Unorderd List</title>
</head>
<body>
    <!-- Ordered List -->
    <h1>Ordered List</h1>
    <ol>
        <li>Cola.</li>
        <li>Coffee</li>
        <li>Energy Drink.</li>
        <li>Tea.</li>
    </ol>
    <!-- Ordered List style 1.lower-roman 2.upper-roman 3.lower-alpha 4.upper-alpha  -->
    <h2>Ordered List style</h2>
    <ol style="list-style: upper-alpha;">
        <li>Cola.</li>
        <li>Coffee</li>
        <li>Energy Drink.</li>
        <li>Tea.</li>
    </ol>

    <!-- Unordered List  -->
    <h1>Unordered List</h1>
    <ul>
        <li>Oranges	</li>
        <li>Banana</li>
        <li>Apple</li>
        <li>Papaya</li>
    </ul>

    <!-- Unordered List style 1.disc 2.circle 3.square   -->
    <h2>Unordered List style</h2>
    <ul style="list-style: square;">
        <li>Oranges	</li>
        <li>Banana</li>
        <li>Apple</li>
        <li>Papaya</li>
    </ul>
</body>
</html>
