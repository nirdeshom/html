<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tag in HTML</title>
    <style>
        video{
            border-radius: 10px;
            
        }
    </style>
</head>
<body>
    <!-- the <video> html element embeds a media player which supports video playback into the document -->

    <h1>Video Tag in HTML</h1>
    
    <video width="300" controls poster="images/Capture.PNG">
        <source src="/html/video/video1.mp4" type="video/mp4">
    </video>
</body>
</html>
