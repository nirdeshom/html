<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>images in HTML</title>
</head>
<body>
    <!-- the <img> tag is used to embed(ADD) an image in an html page -->
    <img src="/html/images/nirdesh.jpeg" alt="My Photo" width="200" height="200">

    <hr>
    <!-- Clicking on the image will open a new window -->

    <h1>Clicking on the image will open a new window</h1>
    <a href="https://www.w3schools.com/html/html_links.asp" target="_blank">
        <img src="/html/images/nir.jpg" alt="My Photo" width="300" height="400">
    </a>


</body>
</html>
